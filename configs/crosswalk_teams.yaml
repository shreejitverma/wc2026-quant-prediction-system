# Canonical team name crosswalk.
# canonical: the internal standard (FIFA English form)
# aliases: every source-specific string we have seen for this team
#
# Sources covered:
#   martj42 (M), eloratings.net 2-letter code (E), Kalshi ticker suffix (K)
#
# 48 WC2026 participants + common historical teams.
# Add fuzzy-match candidates here after human review; never add unconfirmed names.

