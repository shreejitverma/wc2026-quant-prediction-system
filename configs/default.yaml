# Default runtime config. Every run records the hash of the fully-resolved
# config, so this file (plus any overrides) is part of the reproducibility
# contract. Unknown keys are a hard error (extra="forbid").

mode: paper            # paper-then-small-live; live is gated behind Phase 6/7 pre-registration
seed: 20260611

paths:
  raw_dir: data/raw
  processed_dir: data/processed
  ledger_dir: data/ledger
  runs_dir: data/runs

risk:
  bankroll_usd: 5000.0
  kelly_fraction: 0.25
  max_position_per_event_usd: 100.0
  max_portfolio_drawdown_pct: 0.20
  min_edge: 0.03

kill_switch:
  enabled: true
  max_data_staleness_seconds: 120
  pnl_stop_usd: 250.0
  reconcile_every_cycle: true

venues:
  kalshi_enabled: true
  polymarket_enabled: true
  betfair_enabled: false   # no funded access yet; free-first (ADR-0007)

news:
  llm_extraction_enabled: true
  autonomous_trading: false  # hard fence; setting true is a validation error
  review_threshold_quote_move: 0.02
