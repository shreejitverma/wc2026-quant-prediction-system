name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
      
      - name: Install dependencies
        run: make setup
        
      - name: Lint (Ruff)
        run: make lint
        
      - name: Unit Tests (Pytest) with Coverage
        run: make test-cov
        
      - name: End-to-End Self Checks
        run: make selfcheck
        
      - name: Performance Benchmarks
        run: make test-bench

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run linter
        run: npm run lint
      - name: Unit and component tests
        run: npm test
      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync backend deps
        run: uv sync --frozen
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json
      - name: Install frontend deps
        working-directory: ./frontend
        run: npm ci
      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install chromium --with-deps
      - name: Smoke tests (scratch ledger root)
        working-directory: ./frontend
        run: npm run test:e2e
